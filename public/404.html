<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading...</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #0f172a;
        font: 16px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .fallback-shell {
        max-width: 420px;
        padding: 24px;
        border-radius: 16px;
        background: #ffffff;
        border: 1px solid #dbe4ee;
        box-shadow: 0 14px 36px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 20px;
      }

      p {
        margin: 0;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <div class="fallback-shell">
      <h1>Opening Technovohub…</h1>
      <p id="fallback-status">Restoring the requested page.</p>
    </div>

    <script>
      (function () {
        var statusEl = document.getElementById('fallback-status');
        var originalPath = window.location.pathname + window.location.search + window.location.hash;
        var appShellPath = window.location.pathname.startsWith('/nexion/') ? '/nexion/' : '/';

        fetch(appShellPath, {
          method: 'GET',
          credentials: 'same-origin',
          cache: 'no-store'
        })
          .then(function (response) {
            if (!response.ok) {
              throw new Error('Failed to load app shell');
            }
            return response.text();
          })
          .then(function (html) {
            window.history.replaceState(null, '', originalPath);
            document.open();
            document.write(html);
            document.close();
          })
          .catch(function () {
            statusEl.textContent = 'Unable to restore this page automatically. Please go back and reopen the app.';
          });
      })();
    </script>
  </body>
</html>
